<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úloha 02</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <h1>Subscribe to our weekly Newsletter</h1>

        <form @submit.prevent="add" @keydown.escape="clear">
            <input type="text" v-model="newEmail" placeholder="Email address" ref="new">
            <a class="subscribe" @click.prevent="add">Subscribe</a>
        </form>

        <h2>List of registered emails:</h2>

        <ul>
            <li v-for="email in emails" :key="email.id">
                <div class="email-item">{{ email }}</div>
                <a class="remove" @click.prevent="remove(email)">x</a>
            </li>
        </ul>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    newEmail: '',
                    emails: []
                }
            },
            methods: {
                add() {
                    if (!this.newEmail) return

                    this.emails.push(this.newEmail)

                    this.newEmail = ''

                    this.$refs.new.focus()
                },
                clear() {
                    this.newEmail = ''
                },
                remove(email) {
                    this.emails = this.emails.filter(item => item !== email)
                    
                }
            },
        }).mount('#app')
</script>

</body>
</html>
